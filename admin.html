<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>لوحة إدارة الطلبات</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing:border-box; }
    :root {
      --green-dark:#14532d;
      --green:#2d9e5f;
      --green-light:#e8f5ee;
      --border:#e5e7eb;
      --muted:#6b7280;
      --background:#f3f6f4;
      --white:#fff;
      --danger:#b91c1c;
    }
    body {
      margin:0;
      min-height:100vh;
      background:var(--background);
      color:#1f2937;
      font:18px/1.6 'Tajawal', sans-serif;
    }
    header {
      background:linear-gradient(135deg,var(--green-dark),#0b3d20);
      color:#fff;
      border-bottom:4px solid #c9a84c;
    }
    .header-inner, main { width:min(1200px,calc(100% - 32px)); margin:auto; }
    .header-inner {
      min-height:92px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
    }
    h1 { margin:0; font-size:1.55rem; }
    .header-inner p { margin:3px 0 0; color:rgba(255,255,255,.72); font-size:.9rem; }
    .back-link {
      color:#fff;
      border:1px solid rgba(255,255,255,.35);
      border-radius:9px;
      padding:8px 16px;
      text-decoration:none;
      white-space:nowrap;
    }
    main { padding:32px 0 60px; }
    .summary {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      margin-bottom:18px;
    }
    .summary h2 { margin:0; color:var(--green-dark); font-size:1.25rem; }
    .count {
      background:var(--green-light);
      color:var(--green-dark);
      border-radius:999px;
      padding:7px 16px;
      font-weight:700;
    }
    .requests-grid {
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:18px;
    }
    .request-card {
      position:relative;
      overflow:hidden;
      background:var(--white);
      border:1px solid var(--border);
      border-radius:16px;
      box-shadow:0 8px 25px rgba(20,83,45,.08);
      transition:transform .2s ease, box-shadow .2s ease;
    }
    .request-card:hover {
      transform:translateY(-4px);
      box-shadow:0 14px 35px rgba(20,83,45,.14);
    }
    .card-head {
      display:flex;
      align-items:center;
      gap:12px;
      padding:18px;
      background:linear-gradient(135deg,var(--green-dark),#17683a);
      color:#fff;
    }
    .card-number {
      width:38px;
      height:38px;
      flex-shrink:0;
      display:grid;
      place-items:center;
      border-radius:50%;
      background:rgba(255,255,255,.15);
      border:1px solid rgba(255,255,255,.25);
      font-weight:800;
    }
    .card-name {
      min-width:0;
      margin:0;
      font-size:1.05rem;
      line-height:1.35;
      overflow-wrap:anywhere;
    }
    .card-body { padding:8px 18px 12px; }
    .info-row {
      display:grid;
      grid-template-columns:110px minmax(0,1fr);
      gap:10px;
      padding:10px 0;
      border-bottom:1px solid var(--border);
    }
    .info-row:last-child { border-bottom:0; }
    .info-label { color:var(--muted); font-size:.86rem; font-weight:600; }
    .info-value { color:#1f2937; font-size:.92rem; font-weight:700; overflow-wrap:anywhere; }
    .phone-value { direction:ltr; text-align:right; }
    .card-date {
      padding:11px 18px;
      background:#f8faf9;
      border-top:1px solid var(--border);
      color:var(--muted);
      font-size:.82rem;
    }
    .state {
      grid-column:1/-1;
      background:var(--white);
      border:1px solid var(--border);
      border-radius:14px;
      padding:48px 20px;
      text-align:center;
      color:var(--muted);
    }
    .state.error { color:var(--danger); }
    @media (max-width:600px) {
      body { font-size:17px; }
      .header-inner { width:calc(100% - 24px); min-height:unset; padding:18px 0; align-items:flex-start; }
      h1 { font-size:1.2rem; }
      .back-link { padding:7px 11px; font-size:.85rem; }
      main { width:calc(100% - 20px); padding-top:22px; }
      .summary { align-items:flex-start; }
      .requests-grid { grid-template-columns:1fr; gap:14px; }
      .info-row { grid-template-columns:105px minmax(0,1fr); }
    }
    @media (min-width:601px) and (max-width:950px) {
      .requests-grid { grid-template-columns:repeat(2,minmax(0,1fr)); }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div>
        <h1>لوحة إدارة الطلبات</h1>
        <p>تُحدّث البيانات تلقائيًا عند وصول أي طلب جديد</p>
      </div>
      <a class="back-link" href="page1.html">صفحة الطلب</a>
    </div>
  </header>

  <main>
    <div class="summary">
      <h2>طلبات العملاء</h2>
      <div class="count">العدد: <span id="requestCount">0</span></div>
    </div>

    <div class="requests-grid" id="requestsGrid">
      <div class="state">جارٍ تحميل الطلبات...</div>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getDatabase, onValue, ref } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';
    import { firebaseConfig, isFirebaseConfigured } from './firebase-config.js';

    const grid = document.getElementById('requestsGrid');
    const count = document.getElementById('requestCount');

    function escapeHtml(value) {
      const element = document.createElement('div');
      element.textContent = value ?? '—';
      return element.innerHTML;
    }

    function getDateValue(value) {
      if (!value) return 0;
      if (typeof value === 'number') return value;
      const parsed = Date.parse(value);
      return Number.isNaN(parsed) ? 0 : parsed;
    }

    function formatDate(value) {
      const timestamp = getDateValue(value);
      if (!timestamp) return '—';
      return new Intl.DateTimeFormat('ar', {
        dateStyle:'medium',
        timeStyle:'short'
      }).format(new Date(timestamp));
    }

    if (!isFirebaseConfigured()) {
      grid.innerHTML = '<div class="state error">يرجى إضافة إعدادات Firebase داخل ملف firebase-config.js.</div>';
    } else {
      const database = getDatabase(initializeApp(firebaseConfig));

      onValue(ref(database, 'requests'), snapshot => {
        const requests = [];
        snapshot.forEach(child => {
          requests.push({ id:child.key, ...child.val() });
        });
        requests.sort((a,b) => getDateValue(b.createdAt) - getDateValue(a.createdAt));
        count.textContent = requests.length;

        if (!requests.length) {
          grid.innerHTML = '<div class="state">لا توجد طلبات حتى الآن.</div>';
          return;
        }

        grid.innerHTML = requests.map((request,index) => `
          <article class="request-card">
            <div class="card-head">
              <div class="card-number">${index + 1}</div>
              <h3 class="card-name">${escapeHtml(request.name || request.fullName)}</h3>
            </div>
            <div class="card-body">
              <div class="info-row">
                <span class="info-label">رقم الجوال</span>
                <span class="info-value phone-value">${escapeHtml(request.phone)}</span>
              </div>
              <div class="info-row">
                <span class="info-label">الجنسية</span>
                <span class="info-value">${escapeHtml(request.nationality)}</span>
              </div>
              <div class="info-row">
                <span class="info-label">البلد</span>
                <span class="info-value">${escapeHtml(request.country)}</span>
              </div>
              <div class="info-row">
                <span class="info-label">المدينة</span>
                <span class="info-value">${escapeHtml(request.city || request.residence)}</span>
              </div>
              <div class="info-row">
                <span class="info-label">الحالة الاجتماعية</span>
                <span class="info-value">${escapeHtml(request.maritalStatus || request.status)}</span>
              </div>
            </div>
            <div class="card-date">تاريخ الإرسال: ${escapeHtml(formatDate(request.createdAt))}</div>
          </article>
        `).join('');
      }, error => {
        console.error('Firebase read error:', error);
        grid.innerHTML = '<div class="state error">تعذر تحميل الطلبات. تحقق من اتصال Firebase وقواعد قاعدة البيانات.</div>';
      });
    }
  </script>
</body>
</html>
