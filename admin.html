<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>لوحة إدارة الطلبات</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing:border-box; }
    :root {
      --green-dark:#0b1739;
      --green:#1d4ed8;
      --green-light:#172554;
      --border:#263556;
      --muted:#aab6cf;
      --background:#080d18;
      --white:#111827;
      --danger:#f87171;
    }
    body {
      margin:0;
      min-height:100vh;
      background:var(--background);
      color:#e5e7eb;
      font:18px/1.6 'Tajawal', sans-serif;
    }
    header {
      background:linear-gradient(135deg,#030712,#0b1739 60%,#10275c);
      color:#fff;
      border-bottom:4px solid #2563eb;
    }
    .header-inner, main { width:min(1200px,calc(100% - 32px)); margin:auto; }
    .header-inner {
      min-height:92px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
    }
    h1 { margin:0; font-size:1.55rem; }
    .header-inner p { margin:3px 0 0; color:rgba(255,255,255,.72); font-size:.9rem; }
    .back-link {
      color:#fff;
      border:1px solid rgba(255,255,255,.35);
      border-radius:9px;
      padding:8px 16px;
      text-decoration:none;
      white-space:nowrap;
    }
    main { padding:32px 0 60px; }
    .summary {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      margin-bottom:18px;
    }
    .summary h2 { margin:0; color:#dbeafe; font-size:1.25rem; }
    .count {
      background:var(--green-light);
      color:#bfdbfe;
      border:1px solid #29417a;
      border-radius:999px;
      padding:7px 16px;
      font-weight:700;
    }
    .admin-toolbar {
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:18px;
    }
    .search-box {
      position:relative;
      flex:1;
    }
    .search-box input {
      width:100%;
      border:1px solid var(--border);
      border-radius:10px;
      background:#111827;
      color:#f8fafc;
      padding:11px 14px;
      font:600 .95rem/1.4 'Tajawal', sans-serif;
      outline:none;
    }
    .search-box input::placeholder { color:#94a3b8; }
    .search-box input:focus { border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,.2); }
    .requests-grid {
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:18px;
    }
    .request-card {
      position:relative;
      overflow:hidden;
      background:var(--white);
      border:1px solid var(--border);
      border-radius:16px;
      box-shadow:0 10px 30px rgba(0,0,0,.35);
      transition:transform .2s ease, box-shadow .2s ease;
    }
    .request-card:hover {
      transform:translateY(-4px);
      border-color:#3157a5;
      box-shadow:0 16px 38px rgba(0,0,0,.5);
    }
    .request-card.viewed {
      border-color:#16a34a;
      box-shadow:0 10px 30px rgba(22,163,74,.18);
    }
    .request-card.viewed .card-head {
      background:linear-gradient(135deg,#052e16,#14532d);
    }
    .card-head {
      display:flex;
      align-items:center;
      gap:12px;
      padding:18px;
      background:linear-gradient(135deg,#0a1020,#10275c);
      color:#fff;
    }
    .card-number {
      width:38px;
      height:38px;
      flex-shrink:0;
      display:grid;
      place-items:center;
      border-radius:50%;
      background:rgba(255,255,255,.15);
      border:1px solid rgba(255,255,255,.25);
      font-weight:800;
    }
    .card-name {
      min-width:0;
      margin:0;
      font-size:1.05rem;
      line-height:1.35;
      overflow-wrap:anywhere;
    }
    .card-body { padding:8px 18px 12px; }
    .card-actions {
      display:flex;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
      gap:10px;
      padding:14px 18px 18px;
      border-top:1px solid var(--border);
    }
    .view-button,
    .whatsapp-button,
    .template-button,
    .delete-button {
      flex:1 1 120px;
      min-width:0;
      border:0;
      border-radius:10px;
      padding:10px 14px;
      color:#fff;
      font:700 .92rem/1.4 'Tajawal', sans-serif;
      text-align:center;
      text-decoration:none;
      cursor:pointer;
      transition:background .2s ease, transform .2s ease;
    }
    .view-button { background:#2563eb; }
    .view-button:hover { background:#1d4ed8; transform:translateY(-1px); }
    .view-button.is-viewed { background:#16a34a; }
    .view-button.is-viewed:hover { background:#15803d; }
    .whatsapp-button { background:#22c55e; }
    .whatsapp-button:hover { background:#16a34a; transform:translateY(-1px); }
    .template-button { background:#c9a84c; color:#111827; }
    .template-button:hover { background:#d4b055; transform:translateY(-1px); }
    .delete-button { background:#7f1d1d; }
    .delete-button:hover { background:#b91c1c; transform:translateY(-1px); }
    .whatsapp-button.is-disabled {
      pointer-events:none;
      background:#475569;
      color:#cbd5e1;
      cursor:not-allowed;
    }
    .info-row {
      display:grid;
      grid-template-columns:110px minmax(0,1fr);
      gap:10px;
      padding:10px 0;
      border-bottom:1px solid var(--border);
    }
    .info-row:last-child { border-bottom:0; }
    .info-label { color:var(--muted); font-size:.86rem; font-weight:600; }
    .info-value { color:#f3f4f6; font-size:.92rem; font-weight:700; overflow-wrap:anywhere; }
    .phone-value { direction:ltr; text-align:right; }
    .state {
      grid-column:1/-1;
      background:var(--white);
      border:1px solid var(--border);
      border-radius:14px;
      padding:48px 20px;
      text-align:center;
      color:var(--muted);
    }
    .state.error { color:var(--danger); }
    .admin-shell[hidden] { display:none; }
    .login-screen {
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
      background:linear-gradient(135deg,#030712,#0b1739 62%,#10275c);
    }
    .login-box {
      width:min(420px,100%);
      background:#111827;
      border:1px solid var(--border);
      border-radius:14px;
      padding:26px;
      box-shadow:0 18px 45px rgba(0,0,0,.38);
    }
    .login-box h2 { margin:0 0 6px; color:#dbeafe; font-size:1.35rem; }
    .login-box p { margin:0 0 20px; color:var(--muted); font-size:.92rem; }
    .login-field { margin-bottom:14px; }
    .login-field label {
      display:block;
      margin-bottom:7px;
      color:#dbeafe;
      font-size:.9rem;
      font-weight:700;
    }
    .login-field input {
      width:100%;
      border:1px solid #334155;
      border-radius:9px;
      background:#0b1220;
      color:#f8fafc;
      padding:11px 12px;
      font:600 1rem/1.4 'Tajawal', sans-serif;
      outline:none;
    }
    .login-field input:focus { border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,.22); }
    .login-button {
      width:100%;
      border:0;
      border-radius:9px;
      background:#2563eb;
      color:#fff;
      padding:11px 16px;
      font:800 1rem/1.4 'Tajawal', sans-serif;
      cursor:pointer;
      transition:background .2s ease, transform .2s ease;
    }
    .login-button:hover { background:#1d4ed8; transform:translateY(-1px); }
    .login-error {
      min-height:24px;
      margin:12px 0 0;
      color:var(--danger);
      font-size:.9rem;
      font-weight:700;
      text-align:center;
    }
    @media (max-width:600px) {
      body { font-size:17px; }
      .login-screen { padding:18px; }
      .login-box { padding:20px; }
      .header-inner { width:calc(100% - 24px); min-height:unset; padding:18px 0; align-items:flex-start; }
      h1 { font-size:1.2rem; }
      .back-link { padding:7px 11px; font-size:.85rem; }
      main { width:calc(100% - 20px); padding-top:22px; }
      .summary { align-items:flex-start; }
      .admin-toolbar { margin-bottom:14px; }
      .requests-grid { grid-template-columns:1fr; gap:14px; }
      .card-actions {
        display:grid;
        grid-template-columns:repeat(2,minmax(0,1fr));
        gap:8px;
        padding:10px 12px 12px;
      }
      .card-actions > * {
        width:auto;
        min-height:38px;
        display:flex;
        align-items:center;
        justify-content:center;
      }
      .view-button,
      .whatsapp-button,
      .template-button,
      .delete-button {
        flex:none;
        border-radius:8px;
        padding:8px 10px;
        font-size:.78rem;
        line-height:1.35;
      }
      .view-button,
      .delete-button { grid-column:1/-1; }
      .info-row { grid-template-columns:105px minmax(0,1fr); }
    }
    @media (min-width:601px) and (max-width:950px) {
      .requests-grid { grid-template-columns:repeat(2,minmax(0,1fr)); }
    }
  </style>
</head>
<body>
  <section class="login-screen" id="loginScreen">
    <form class="login-box" id="loginForm">
      <h2>تسجيل دخول الأدمن</h2>
      <p>أدخل اسم المستخدم وكلمة السر لعرض الطلبات.</p>
      <div class="login-field">
        <label for="adminUsername">اسم المستخدم</label>
        <input id="adminUsername" type="text" autocomplete="username" required/>
      </div>
      <div class="login-field">
        <label for="adminPassword">كلمة السر</label>
        <input id="adminPassword" type="password" autocomplete="current-password" required/>
      </div>
      <button class="login-button" type="submit">دخول</button>
      <div class="login-error" id="loginError" aria-live="polite"></div>
    </form>
  </section>

  <div class="admin-shell" id="adminApp" hidden>
  <header>
    <div class="header-inner">
      <div>
        <h1>لوحة إدارة الطلبات</h1>
        <p>تُحدّث البيانات تلقائيًا عند وصول أي طلب جديد</p>
      </div>
      <a class="back-link" href="page1.html">صفحة الطلب</a>
    </div>
  </header>

  <main>
    <div class="summary">
      <h2>طلبات العملاء</h2>
      <div class="count">العدد: <span id="requestCount">0</span></div>
    </div>

    <div class="admin-toolbar">
      <div class="search-box">
        <input id="adminSearchInput" type="search" placeholder="ابحث بالاسم، رقم الجوال، البلد، الجنسية..."/>
      </div>
    </div>

    <div class="requests-grid" id="requestsGrid">
      <div class="state">جارٍ تحميل الطلبات...</div>
    </div>
  </main>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getDatabase, onValue, ref, set, remove } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';
    import { firebaseConfig, isFirebaseConfigured } from './firebase-config.js';

    const grid = document.getElementById('requestsGrid');
    const count = document.getElementById('requestCount');
    const searchInput = document.getElementById('adminSearchInput');
    const loginScreen = document.getElementById('loginScreen');
    const adminApp = document.getElementById('adminApp');
    const loginForm = document.getElementById('loginForm');
    const loginError = document.getElementById('loginError');
    const adminUsername = document.getElementById('adminUsername');
    const adminPassword = document.getElementById('adminPassword');
    const validUsername = 'ahmadshaheen';
    const validPassword = 'ahmad992003';
    const sessionKey = 'adminLoggedIn';
    let adminStarted = false;
    let allRequests = [];

    function escapeHtml(value) {
      const element = document.createElement('div');
      element.textContent = value ?? '—';
      return element.innerHTML;
    }

    function getDateValue(value) {
      if (!value) return 0;
      if (typeof value === 'number') return value;
      const parsed = Date.parse(value);
      return Number.isNaN(parsed) ? 0 : parsed;
    }

    function formatDate(value) {
      const timestamp = getDateValue(value);
      if (!timestamp) return '—';
      return new Intl.DateTimeFormat('ar', {
        dateStyle:'medium',
        timeStyle:'short'
      }).format(new Date(timestamp));
    }

    function getTemplateUrl(requestId) {
      return `receipt.html?requestId=${encodeURIComponent(requestId)}`;
    }

    function getWhatsappUrl(phone) {
      if (!phone) return '';
      let digits = String(phone).replace(/\D/g, '');
      if (digits.startsWith('00')) digits = digits.slice(2);
      return digits ? `https://wa.me/${digits}` : '';
    }

    function getRequestPhoneKey(phone) {
      if (!phone) return '';
      let digits = String(phone).replace(/\D/g, '');
      if (digits.startsWith('00')) digits = digits.slice(2);
      return digits;
    }

    function removeDuplicateRequests(requests) {
      const seenPhones = new Set();
      return requests.filter(request => {
        const phoneKey = getRequestPhoneKey(request.phone);
        if (!phoneKey) return true;
        if (seenPhones.has(phoneKey)) return false;
        seenPhones.add(phoneKey);
        return true;
      });
    }

    function startAdmin() {
      if (adminStarted) return;
      adminStarted = true;

      if (!isFirebaseConfigured()) {
      grid.innerHTML = '<div class="state error">يرجى إضافة إعدادات Firebase داخل ملف firebase-config.js.</div>';
    } else {
      const database = getDatabase(initializeApp(firebaseConfig));

      onValue(ref(database, 'requests'), snapshot => {
        const requests = [];
        snapshot.forEach(child => {
          requests.push({ id:child.key, ...child.val() });
        });
        requests.sort((a,b) => getDateValue(b.createdAt) - getDateValue(a.createdAt));
        const uniqueRequests = removeDuplicateRequests(requests);
        count.textContent = uniqueRequests.length;

        if (!uniqueRequests.length) {
          grid.innerHTML = '<div class="state">لا توجد طلبات حتى الآن.</div>';
          return;
        }

        grid.innerHTML = uniqueRequests.map((request,index) => {
          const isViewed = request.viewed === true;
          const whatsappUrl = getWhatsappUrl(request.phone);

          return `
          <article class="request-card${isViewed ? ' viewed' : ''}" data-request-id="${escapeHtml(request.id)}">
            <div class="card-head">
              <div class="card-number">${index + 1}</div>
              <h3 class="card-name">${escapeHtml(request.name || request.fullName)}</h3>
            </div>
            <div class="card-body">
              <div class="info-row">
                <span class="info-label">رقم الجوال</span>
                <span class="info-value phone-value">${escapeHtml(request.phone)}</span>
              </div>
              <div class="info-row">
                <span class="info-label">الجنسية</span>
                <span class="info-value">${escapeHtml(request.nationality)}</span>
              </div>
              <div class="info-row">
                <span class="info-label">البلد</span>
                <span class="info-value">${escapeHtml(request.country)}</span>
              </div>
              <div class="info-row">
                <span class="info-label">المدينة</span>
                <span class="info-value">${escapeHtml(request.city || request.residence)}</span>
              </div>
              <div class="info-row">
                <span class="info-label">الحالة الاجتماعية</span>
                <span class="info-value">${escapeHtml(request.maritalStatus || request.status)}</span>
              </div>
              <div class="info-row">
                <span class="info-label">الدخل الشهري</span>
                <span class="info-value">${request.income ? `${escapeHtml(Number(request.income).toLocaleString('ar'))} ${escapeHtml(request.incomeCurrency)}` : 'لا يوجد'}</span>
              </div>
            </div>
            <div class="card-actions">
              <a class="template-button" href="${escapeHtml(getTemplateUrl(request.id))}" target="_blank" rel="noopener">
                إشعار الاستلام
              </a>
              <a class="whatsapp-button${whatsappUrl ? '' : ' is-disabled'}" href="${escapeHtml(whatsappUrl || '#')}" target="_blank" rel="noopener">
                محادثة واتساب
              </a>
              <button class="view-button${isViewed ? ' is-viewed' : ''}" type="button" data-viewed="${isViewed}">
                ${isViewed ? 'تمت مشاهدة الطلب' : 'شفت الطلب'}
              </button>
            </div>
          </article>
        `;
        }).join('');
      }, error => {
        console.error('Firebase read error:', error);
        grid.innerHTML = '<div class="state error">تعذر تحميل الطلبات. تحقق من اتصال Firebase وقواعد قاعدة البيانات.</div>';
      });

      grid.addEventListener('click', event => {
        const button = event.target.closest('.view-button');
        if (!button) return;

        const card = button.closest('.request-card');
        const requestId = card?.dataset.requestId;
        if (!requestId) return;

        const nextViewed = button.dataset.viewed !== 'true';
        button.disabled = true;

        set(ref(database, `requests/${requestId}/viewed`), nextViewed).catch(error => {
          console.error('Firebase update error:', error);
          button.disabled = false;
          alert('تعذر تحديث حالة الطلب. تحقق من اتصال Firebase وقواعد قاعدة البيانات.');
        });
      });
    }

    }

    function showAdmin() {
      loginScreen.hidden = true;
      adminApp.hidden = false;
      startAdmin();
    }

    loginForm.addEventListener('submit', event => {
      event.preventDefault();
      const username = adminUsername.value.trim();
      const password = adminPassword.value;

      if (username === validUsername && password === validPassword) {
        sessionStorage.setItem(sessionKey, 'true');
        loginError.textContent = '';
        showAdmin();
        return;
      }

      loginError.textContent = 'اسم المستخدم أو كلمة السر غير صحيحة.';
      adminPassword.value = '';
      adminPassword.focus();
    });

    if (sessionStorage.getItem(sessionKey) === 'true') {
      showAdmin();
    }
  </script>
</body>
</html>
